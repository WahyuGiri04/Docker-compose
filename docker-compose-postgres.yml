# version: '3.9'

services:
  postgres:
    image: postgres:17.10-alpine3.23
    container_name: postgres-db
    environment:
      POSTGRES_USER: mii
      POSTGRES_PASSWORD: mii123
      POSTGRES_DB: db-mii
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "unix_socket_directories=/var/run/postgresql"]
    networks:
      - pgnet

volumes:
  pgdata:

networks:
  pgnet:
    name: pgnet
